name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required by dorny/test-reporter to write Check Runs and annotate PRs
permissions:
  checks: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------------
  # Backend: Python tests
  # -------------------------------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --junitxml=reports/junit.xml

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()   # run even when tests fail so the report is always published
        with:
          name: Backend Tests
          path: backend/reports/junit.xml
          reporter: java-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Frontend: Vitest unit tests
  # -------------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=reports/junit.xml

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests
          path: frontend/reports/junit.xml
          reporter: java-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Docker: build + push to DockerHub (main branch only)
  # -------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pm-app
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
